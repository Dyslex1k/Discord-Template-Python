name: Python pytest CI

on:
  push:
    branches: [ 'master', 'dev' ]
  pull_request:
    branches: [ 'master', 'dev' ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          pytest -q tests

      - name: Build Docker image
        run: |
          docker build --target runtime -t discord-template-ci .

      - name: Verify tests inside Docker image
        run: |
          docker run --rm discord-template-ci pytest -q tests
